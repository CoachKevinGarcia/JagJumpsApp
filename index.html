<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>A Jaguar's Horizontal Jumps Plan</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0D1B2A;color:#F5F0E8;font-family:'DM Sans',sans-serif;overflow:hidden}

/* SCREENS */
.screen{position:fixed;inset:0;background:#0D1B2A;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s ease}
.screen.off{transform:translateX(100%);opacity:0;pointer-events:none}

/* NAV */
.nav{display:flex;align-items:center;gap:12px;padding:14px 20px 12px;position:sticky;top:0;z-index:50;background:#0D1B2A;border-bottom:1px solid rgba(255,255,255,.07)}
.nav-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#F5F0E8;flex-shrink:0}
.nav-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8;flex:1}
.nav-btn{padding:7px 13px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);font-size:12px;color:#F5F0E8;cursor:pointer;font-family:'DM Sans',sans-serif}

/* HOME */
.home-header{padding:36px 20px 22px;border-bottom:2px solid #8A8A9A;position:relative;overflow:hidden}
.home-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(176,176,196,.04) 80px,rgba(176,176,196,.04) 81px);pointer-events:none}
.logo-row{display:flex;align-items:center;gap:18px;margin-bottom:10px}
.home-ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#F5F0E8;margin-bottom:7px}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,8vw,56px);line-height:.9;color:#F5F0E8}
.home-title span{color:#F5F0E8;display:block}
.home-ver{margin-top:10px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(160,152,128,.5)}
.weeks-list{padding:18px 20px;display:flex;flex-direction:column;gap:10px}
.weeks-ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8;margin-bottom:2px}
.week-tile{background:#152336;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:15px 44px 15px 16px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
.week-tile:active{background:#1E3450}
.w-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.w-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;margin-bottom:3px}
.w-date{font-family:'DM Mono',monospace;font-size:10px;color:#F5F0E8;margin-bottom:8px}
.w-dots{display:flex;gap:5px}
.w-dot{flex:1;height:4px;border-radius:2px}
.w-chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:20px;color:#F5F0E8}
.add-btn{margin:2px 20px 20px;width:calc(100% - 40px);padding:14px;border-radius:10px;border:1px dashed rgba(255,255,255,.15);background:transparent;color:#F5F0E8;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:block}

/* WEEK */
.week-hero{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.wh-ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#F5F0E8;margin-bottom:7px}
.wh-name{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:.9;color:#F5F0E8;margin-bottom:7px}
.wh-date{font-size:12px;color:#F5F0E8;font-weight:300}
.week-body{padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.sec-ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8;padding:2px}

/* COLLAPSIBLE CARD */
.ccard{background:#152336;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.ccard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.ccard-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8}
.ccard-right{display:flex;align-items:center;gap:8px}
.ccard-edit{font-size:11px;color:#F5F0E8;cursor:pointer;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05)}
.ccard-chev{font-size:16px;color:#F5F0E8;transition:transform .22s;line-height:1}
.ccard-chev.open{transform:rotate(90deg)}
.ccard-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.ccard-body.open{max-height:4000px}
.ccard-inner{padding:12px 14px}

/* WEEK CONTENT */
.int-grid{display:flex;gap:8px}
.int-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.int-col-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#F5F0E8}
.int-track{width:100%;height:52px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.int-fill{width:100%;border-radius:4px}
.int-pct{font-family:'DM Mono',monospace;font-size:9px;color:#F5F0E8}
.meet-row{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.meet-row:last-child{border-bottom:none}
.meet-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:3px;white-space:nowrap;background:rgba(176,176,196,.1);color:#F5F0E8;border:1px solid rgba(176,176,196,.25)}
.meet-txt{font-size:12px;font-weight:300;color:rgba(245,240,232,.8);line-height:1.5}
.meet-txt strong{font-weight:600;color:#F5F0E8}
.rg-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#F5F0E8;margin:8px 0 5px}
.ath-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.ath-row:last-child{border-bottom:none}
.ath-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ath-name{font-size:13px;font-weight:500;flex:1}
.ath-marks{text-align:right}
.ath-ev{font-family:'DM Mono',monospace;font-size:9px;color:#F5F0E8;display:block}
.ath-mk{font-family:'DM Mono',monospace;font-size:10px;color:#F5F0E8;display:block}
.goal-row{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.goal-row:last-child{border-bottom:none}
.goal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.goal-name{font-size:13px;font-weight:600;color:#F5F0E8;margin-bottom:2px}
.goal-ev{font-family:'DM Mono',monospace;font-size:9px;color:#F5F0E8;letter-spacing:1px;margin-bottom:4px}
.goal-tgts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.gp{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px}
.gp.e{background:rgba(199,91,122,.15);color:#E87A98;border:1px solid rgba(199,91,122,.3)}
.gp.b{background:rgba(58,124,165,.15);color:#5BA3CC;border:1px solid rgba(58,124,165,.3)}
.goal-cue{font-size:11px;color:rgba(245,240,232,.75);font-style:italic;line-height:1.5;border-left:2px solid rgba(255,255,255,.1);padding-left:8px}
.note-row{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.note-row:last-child{border-bottom:none}
.note-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.note-badge.info{background:rgba(176,176,196,.1);color:#F5F0E8;border:1px solid rgba(176,176,196,.25)}
.note-badge.warn{background:rgba(232,122,90,.1);color:#E87A5A;border:1px solid rgba(232,122,90,.25)}
.note-txt{font-size:12px;font-weight:300;color:rgba(245,240,232,.9);line-height:1.5}

/* DAY TILES */
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.day-tile{background:#152336;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
.day-tile:active{background:#1E3450}
.dt-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.dt-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:5px}
.dt-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;margin-bottom:3px}
.dt-focus{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:#F5F0E8;margin-bottom:9px;line-height:1.4}
.dt-int{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:3px}
.dt-int-fill{height:100%;border-radius:2px}
.dt-pct{font-family:'DM Mono',monospace;font-size:9px;color:#F5F0E8}

/* DAY SCREEN */
.day-hero{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.dh-ey{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8;margin-bottom:5px}
.dh-name{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:.9;margin-bottom:5px}
.dh-focus{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#F5F0E8;margin-bottom:10px}
.dh-int{display:flex;align-items:center;gap:10px}
.dh-int-lbl,.dh-int-pct{font-family:'DM Mono',monospace;font-size:10px;color:#F5F0E8}
.dh-int-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.dh-int-fill{height:100%;border-radius:2px}
.day-body{padding:14px 20px;display:flex;flex-direction:column;gap:12px}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#F5F0E8}
.sec-line{flex:1;height:1px;background:rgba(255,255,255,.07)}
.pblock{border-radius:8px;padding:12px;margin-bottom:7px}
.pblock:last-child{margin-bottom:0}
.pblock.shared{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09)}
.pblock.beginner{background:rgba(58,124,165,.08);border:1px solid rgba(58,124,165,.22)}
.pblock.elite{background:rgba(199,91,122,.08);border:1px solid rgba(199,91,122,.22)}
.pblock.lift{background:rgba(45,80,22,.22);border:1px solid rgba(61,107,31,.38)}
.pblock.warmup{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)}
.pb-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.shared .pb-lbl{color:#F5F0E8}
.beginner .pb-lbl{color:#5BA3CC}
.elite .pb-lbl{color:#E87A98}
.lift .pb-lbl{color:#7DB860}
.warmup .pb-lbl{color:#F5F0E8}
.dl{list-style:none;display:flex;flex-direction:column;gap:6px}
.dl li{font-size:12px;line-height:1.45;color:#F0EBE3;padding-left:14px;position:relative;font-weight:300}
.dl li::before{content:'→';position:absolute;left:0;top:2px;font-size:10px;color:#F5F0E8}
.dl li strong{font-weight:600;color:#F5F0E8}
.dl li em{font-style:normal;font-size:11px;color:#F5F0E8;display:block;margin-top:1px}
.dl li.dim{color:rgba(245,240,232,.3)}
.dl li.dim strong{color:rgba(245,240,232,.35)}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.pill{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:1px}
.shared .pill{background:rgba(255,255,255,.07);color:#F5F0E8}
.beginner .pill{background:rgba(58,124,165,.18);color:#5BA3CC}
.elite .pill{background:rgba(199,91,122,.18);color:#E87A98}
.lift .pill{background:rgba(45,80,22,.4);color:#7DB860}
.wu-text{font-size:12px;color:#D8D0C4;line-height:1.75;font-weight:300}
.opt-text{color:#E05555;font-style:italic}

/* MODAL */

/* TOAST */
.empty{color:#F5F0E8;font-size:12px;padding:4px 0}
</style>
</head>

function loadData(){try{const v=localStorage.getItem('jp-ver');if(v!==VER){localStorage.removeItem('jp-data');localStorage.setItem('jp-ver',VER);return null;}const d=localStorage.getItem('jp-data');return d?JSON.parse(d):null;}catch(e){return null;}}
function saveData(){try{localStorage.setItem('jp-data',JSON.stringify(APP));}catch(e){}}



function init(){
  APP=loadData()||JSON.parse(JSON.stringify(SEED));
  document.getElementById('home-ver').textContent=VER;
  renderHome();
}


function go(sid){document.querySelectorAll('.screen').forEach(s=>{if(s.id===sid){s.classList.remove('off');s.scrollTop=0;}else s.classList.add('off');});}

function toggleC(bodyId,chevId){
  const body=document.getElementById(bodyId);
  const chev=document.getElementById(chevId);
  if(!body)return;
  const open=body.classList.toggle('open');
  if(chev)chev.classList.toggle('open',open);
}

function renderHome(){
  const list=document.getElementById('week-list');
  list.innerHTML='';
  [...APP.weeks].reverse().forEach(w=>{
    const dots=(w.days||[]).map(d=>`<div class="w-dot" style="background:${d.color}88"></div>`).join('');
    const el=document.createElement('div');
    el.className='week-tile';
    el.innerHTML=`<div class="w-bar" style="background:${w.color}"></div><div class="w-name" style="color:${w.color}">${w.name}</div><div class="w-date">${w.dates}</div><div class="w-dots">${dots}</div><div class="w-chev">&#8250;</div>`;
    el.addEventListener('click',()=>openWeek(w.id));
    list.appendChild(el);
  });
}

function openWeek(id){CW=APP.weeks.find(w=>w.id===id);if(!CW)return;renderWeek();go('s-week');}

function renderWeek(){
  const w=CW;
  document.getElementById('w-title').textContent=w.name.toUpperCase();
  document.getElementById('w-ey').textContent=w.label||'Practice Week';
  document.getElementById('w-name').textContent=w.name;
  document.getElementById('w-date').textContent=w.dates;
  const meets=w.meets||[];
  document.getElementById('w-meets').innerHTML=meets.length?meets.map(m=>`<div class="meet-row"><span class="meet-badge">${m.date}</span><span class="meet-txt"><strong>${m.type}:</strong> ${m.name}</span></div>`).join(''):'<div class="empty">No meets scheduled.</div>';
  const daysEl=document.getElementById('w-days');
  daysEl.innerHTML='';
  (w.days||[]).forEach(d=>{
    const el=document.createElement('div');el.className='day-tile';
    el.innerHTML=`<div class="dt-bar" style="background:${d.color}"></div><div class="dt-tag" style="background:${d.color}22;color:${d.color};border:1px solid ${d.color}55">${d.tag}</div><div class="dt-name" style="color:${d.color}">${d.name}</div><div class="dt-focus">${d.focus}</div><div class="dt-int"><div class="dt-int-fill" style="width:${d.intensity}%;background:${d.color}"></div></div><div class="dt-pct">${d.intensity}%</div>`;
    el.addEventListener('click',()=>openDay(d.id));
    daysEl.appendChild(el);
  });
  document.getElementById('w-cn').innerHTML=w.coachingNotes||'<div class="empty">No coaching notes.</div>';
  const sn=w.scheduleNotes||[];
  document.getElementById('w-sn').innerHTML=sn.length?sn.map(n=>`<div class="note-row"><span class="note-badge ${n.type||'info'}">${n.badge}</span><span class="note-txt">${n.text}</span></div>`).join(''):'<div class="empty">No schedule notes.</div>';
  const rEl=document.getElementById('w-roster');rEl.innerHTML='';
  const ath=w.athletes||[];
  const elite=ath.filter(a=>a.group==='elite');
  const bBoth=ath.filter(a=>a.group==='beginner'&&a.events.includes('TJ'));
  const bLJ=ath.filter(a=>a.group==='beginner'&&!a.events.includes('TJ'));
  [{label:'Elite',list:elite,color:'#E87A98'},{label:'Beginner — Both Events',list:bBoth,color:'#5BA3CC'},{label:'Beginner — Long Jump Only',list:bLJ,color:'#5BA3CC'}].forEach(g=>{
    if(!g.list.length)return;
    const h=document.createElement('div');h.className='rg-lbl';h.textContent=g.label;rEl.appendChild(h);
    g.list.forEach(a=>{
      const r=document.createElement('div');r.className='ath-row';
      r.style.cursor='default';
      r.innerHTML=`<div class="ath-dot" style="background:${g.color}"></div><div class="ath-name">${a.name}</div><div class="ath-marks"><span class="ath-ev">${a.events}</span><span class="ath-mk">${a.marks}</span></div>`;
      rEl.appendChild(r);
    });
  });
  const goals=w.goals||[];
  const gEl=document.getElementById('w-goals');
  gEl.innerHTML='';
  if(goals.length){
    goals.forEach(g=>{
      const pc=g.group==='elite'?'e':'b';const dc=g.group==='elite'?'#E87A98':'#5BA3CC';
      const tp=(g.targets||[]).map(t=>`<span class="gp ${pc}">${t}</span>`).join('');
      const el=document.createElement('div');el.className='goal-row';
      el.style.cursor='default';
      el.innerHTML=`<div class="goal-dot" style="background:${dc}"></div><div style="flex:1"><div class="goal-name">${g.athleteName}</div><div class="goal-ev">${g.events}</div><div class="goal-tgts">${tp}</div><div class="goal-cue">${g.cue}</div></div>`;
      gEl.appendChild(el);
    });
  } else {gEl.innerHTML='<div class="empty">No meet goals set.</div>';}
  const rec=w.recovery||[];
  document.getElementById('w-rec').innerHTML=rec.length?rec.map(r=>`<div class="note-row"><span class="note-badge ${r.type||'info'}">${r.badge}</span><span class="note-txt">${r.text}</span></div>`).join(''):'<div class="empty">No recovery notes.</div>';
}

function openDay(id){CD=(CW.days||[]).find(d=>d.id===id);if(!CD)return;renderDay();go('s-day');}

function renderDay(){
  const d=CD;
  document.getElementById('d-nav').textContent=d.name.toUpperCase();
  document.getElementById('d-ey').textContent=CW.name;
  document.getElementById('d-name').textContent=d.name;
  document.getElementById('d-name').style.color=d.color;
  document.getElementById('d-focus').textContent=d.focus;
  document.getElementById('d-int-fill').style.cssText=`width:${d.intensity}%;background:${d.color}`;
  document.getElementById('d-int-pct').textContent=d.intensity+'%';
  const body=document.getElementById('d-body');body.innerHTML='';
  (d.sections||[]).forEach(sec=>{
    const sd=document.createElement('div');
    const sh=document.createElement('div');sh.className='sec-head';
    sh.innerHTML=`<div class="sec-lbl">${sec.title}</div><div class="sec-line"></div>`;
    sd.appendChild(sh);
    (sec.blocks||[]).forEach(b=>sd.appendChild(makeBlock(b)));
    body.appendChild(sd);
  });
}

function makeBlock(b){
  const el=document.createElement('div');el.className='pblock '+b.type;
  if(b.type==='warmup'){
    el.innerHTML=`<div class="pb-lbl">${b.label}</div><div class="wu-text">${(b.content||'').replace(/\n/g,'<br>')}${b.optional?`<br><span class="opt-text">Optional: ${b.optional}</span>`:''}</div>`;
    return el;
  }
  const ls=b.center?'text-align:center':'';
  let h=`<div class="pb-lbl" style="${ls}">${b.label}</div>`;
  if(b.drills&&b.drills.length){
    h+='<ul class="dl">';
    b.drills.forEach(dr=>{h+=`<li class="${dr.dim?'dim':''}"><strong>${dr.name}</strong>${dr.note?`<em>${dr.note}</em>`:''}</li>`;});
    h+='</ul>';
  }
  if(b.pills&&b.pills.length){h+='<div class="pills">'+b.pills.map(p=>`<span class="pill">${p}</span>`).join('')+'</div>';}
  el.innerHTML=h;return el;
}
