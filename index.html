<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jump Practice Planner</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #0D1B2A;
  --sky-mid: #152336;
  --sky-light: #1E3450;
  --silver: #8A8A9A;
  --silver-light: #B0B0C4;
  --white: #F5F0E8;
  --muted: #F5F0E8;
  --beginner: #3A7CA5;
  --beginner-light: #5BA3CC;
  --elite: #C75B7A;
  --elite-light: #E87A98;
  --optional: #E05555;
  --green: #7DB860;
  --orange: #E87A5A;
  --blue: #7BC8F5;
  --lime: #A8D878;
  --radius: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--sky);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--sky);
  transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s ease;
  padding-bottom: calc(20px + var(--safe-bottom));
  -webkit-overflow-scrolling: touch;
}

.screen.hidden        { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.slide-left    { transform: translateX(-40%); opacity: 0; pointer-events: none; }

/* ── NAV BAR ── */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  background: var(--sky);
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.nav-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  font-size: 18px; color: var(--white);
}

.nav-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--silver-light);
  flex: 1;
}

.nav-action {
  padding: 7px 14px;
  border-radius: 6px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 12px;
  color: var(--white);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

.nav-action:active { opacity: 0.7; }

/* ── HOME SCREEN ── */
.home-header {
  padding: 36px 20px 24px;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--silver);
}

.home-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(176,176,196,0.04) 60px, rgba(176,176,196,0.04) 61px);
  pointer-events: none;
}

.home-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--silver-light);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.home-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  line-height: 0.88;
  color: var(--white);
}

.home-title span { color: var(--silver-light); display: block; }

.home-sub {
  margin-top: 14px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
}

.weeks-grid {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.weeks-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  padding: 0 2px;
}

.week-tile {
  background: var(--sky-mid);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s, transform 0.12s;
  position: relative;
  overflow: hidden;
}

.week-tile:active { transform: scale(0.98); }
.week-tile:hover  { background: var(--sky-light); border-color: rgba(255,255,255,0.15); }

.week-tile-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: var(--radius) 0 0 var(--radius);
}

.week-tile-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.week-tile-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1px;
  line-height: 1;
}

.week-tile-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 4px;
}

.week-tile-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}

.week-tile-days {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.day-dot {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
}

.week-tile-chevron {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 18px;
}

.add-week-btn {
  margin: 4px 20px 0;
  padding: 16px;
  border-radius: var(--radius);
  border: 1px dashed rgba(255,255,255,0.15);
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: calc(100% - 40px);
  transition: border-color 0.18s, color 0.18s;
}

.add-week-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }

/* ── WEEK SCREEN ── */
.week-hero {
  padding: 28px 20px 20px;
  border-bottom: 2px solid rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

.week-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(176,176,196,0.03) 60px, rgba(176,176,196,0.03) 61px);
}

.week-hero-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--silver-light);
  margin-bottom: 8px;
}

.week-hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 46px;
  line-height: 0.9;
}

.week-hero-date {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
}

.week-content {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Cards */
.card {
  background: var(--sky-mid);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.card-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.card-edit {
  font-size: 11px;
  color: var(--silver-light);
  cursor: pointer;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
}

.card-body { padding: 14px 16px; }

/* Intensity Overview */
.intensity-grid {
  display: flex;
  gap: 8px;
}

.int-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.int-day-name {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
}

.int-day-bar-track {
  width: 100%;
  height: 60px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.int-day-bar-fill {
  width: 100%;
  border-radius: 4px;
  transition: height 0.5s ease;
}

.int-day-pct {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

/* Roster */
.roster-group { margin-bottom: 12px; }
.roster-group:last-child { margin-bottom: 0; }

.roster-group-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.athlete-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.athlete-row:last-child { border-bottom: none; }

.athlete-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.athlete-name {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
}

.athlete-marks {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}

.athlete-marks span {
  display: block;
  line-height: 1.5;
}

/* Meets */
.meet-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.meet-row:last-child { border-bottom: none; }

.meet-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}

.meet-text { font-size: 12px; font-weight: 300; line-height: 1.5; }
.meet-text strong { font-weight: 600; color: var(--white); }

/* Notes */
.notes-text {
  font-size: 12px;
  color: rgba(245,240,232,0.7);
  line-height: 1.8;
  font-weight: 300;
}

.notes-text strong { color: var(--white); font-weight: 600; }

/* Day tiles */
.days-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.day-tile {
  background: var(--sky-mid);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}

.day-tile:active { transform: scale(0.97); }
.day-tile:hover { background: var(--sky-light); }

.day-tile-accent {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.day-tile-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 4px;
}

.day-tile-focus {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.4;
}

.day-tile-int {
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}

.day-tile-int-fill { height: 100%; border-radius: 2px; }

.day-tile-int-pct {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

.day-tile-tag {
  position: absolute;
  top: 10px; right: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
}

/* ── DAY SCREEN ── */
.day-hero {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.day-hero-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.day-hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  line-height: 0.9;
  margin-bottom: 6px;
}

.day-hero-focus {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.day-int-bar {
  display: flex;
  align-items: center;
  gap: 10px;
}

.day-int-track {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden;
}

.day-int-fill { height: 100%; border-radius: 2px; }
.day-int-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.day-int-pct   { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

.day-sections {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.section-card {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}

.section-card-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.04);
  cursor: pointer;
}

.section-card-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.section-card-chevron {
  font-size: 12px;
  color: var(--muted);
  transition: transform 0.2s;
}

.section-card-chevron.open { transform: rotate(90deg); }

.section-card-body {
  display: none;
  padding: 14px;
}

.section-card-body.open { display: block; }

/* Blocks inside day */
.practice-block {
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid transparent;
}

.practice-block:last-child { margin-bottom: 0; }
.practice-block.shared   { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.09); }
.practice-block.beginner { background: rgba(58,124,165,0.08);  border-color: rgba(58,124,165,0.22); }
.practice-block.elite    { background: rgba(199,91,122,0.08);  border-color: rgba(199,91,122,0.22); }
.practice-block.lift     { background: rgba(45,80,22,0.2);     border-color: rgba(61,107,31,0.35); }
.practice-block.warmup   { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); }

.block-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.shared .block-label   { color: var(--muted); }
.beginner .block-label { color: var(--beginner-light); }
.elite .block-label    { color: var(--elite-light); }
.lift .block-label     { color: var(--green); }
.warmup .block-label   { color: var(--muted); }

.drill-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }

.drill-list li {
  font-size: 13px;
  line-height: 1.45;
  color: rgba(245,240,232,0.83);
  padding-left: 14px;
  position: relative;
  font-weight: 300;
}

.drill-list li::before {
  content: '→';
  position: absolute; left: 0; top: 2px;
  font-size: 10px; color: var(--muted);
}

.drill-list li strong { font-weight: 600; color: var(--white); }

.drill-list li em {
  font-style: normal;
  font-size: 11px;
  color: var(--muted);
  display: block;
  margin-top: 1px;
}

.vol-row {
  display: flex; gap: 5px; flex-wrap: wrap;
  margin-top: 10px; padding-top: 9px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.vol-pill {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 1px;
}

.beginner .vol-pill { background: rgba(58,124,165,0.18);  color: var(--beginner-light); }
.elite .vol-pill    { background: rgba(199,91,122,0.18);  color: var(--elite-light); }
.shared .vol-pill   { background: rgba(255,255,255,0.07); color: var(--muted); }
.lift .vol-pill     { background: rgba(45,80,22,0.4);     color: var(--green); }

.opt-text { color: var(--optional); font-style: italic; font-size: 12px; }

.warmup-text {
  font-size: 12px;
  color: rgba(245,240,232,0.65);
  line-height: 1.8;
  font-weight: 300;
}

/* Mindset block */
.mindset-block {
  background: rgba(199,91,122,0.06);
  border: 1px solid rgba(199,91,122,0.2);
  border-radius: 8px;
  padding: 14px;
  font-size: 12px;
  color: rgba(245,240,232,0.75);
  line-height: 1.8;
}

.mindset-block strong { color: var(--white); font-weight: 600; }

/* ── MODALS ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: #1A2C3F;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  font-size: 22px;
  cursor: pointer;
  color: var(--muted);
  background: none;
  border: none;
  color: var(--muted);
}

.modal-field { margin-bottom: 16px; }

.modal-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.modal-input, .modal-textarea, .modal-select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--white);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.modal-input:focus, .modal-textarea:focus, .modal-select:focus {
  border-color: var(--silver-light);
}

.modal-textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
.modal-select option { background: #1A2C3F; }

.modal-btn {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  background: var(--silver-light);
  color: var(--sky);
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}

.modal-btn-danger {
  background: rgba(224,85,85,0.15);
  color: var(--optional);
  border: 1px solid rgba(224,85,85,0.3);
  margin-top: 8px;
}

.modal-btn:active { opacity: 0.8; }

/* ── TOASTS ── */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(30,52,80,0.95);
  border: 1px solid rgba(176,176,196,0.3);
  padding: 10px 18px;
  border-radius: 30px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
  color: var(--white);
  z-index: 300;
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* White + black outline for all muted-color text elements */
.home-sub, .home-label, .nav-title, .week-tile-date, .weeks-section-label,
.day-focus, .day-tile-focus, .day-tile-int-pct, .day-int-label, .day-int-pct,
.int-day-name, .int-day-pct, .card-label, .roster-group-label, .section-label,
.section-card-title, .block-label, .vol-pill, .wc-title, .modal-label,
.athlete-marks, .int-label, .int-pct, .week-tile-chevron,
.day-hero-focus, .day-hero-label, .week-hero-label, .week-hero-date,
.weeks-section-label, .note-card-label, .coaching-box-label,
.add-week-btn, .card-edit, .nav-action, .day-tile-tag {

// STORAGE
// ══════════════════════════════════════════════

async function loadData() {
  try {
    const result = localStorage.getItem('jump-planner-data');
    return result ? JSON.parse(result) : null;
  } catch {
    return null;
  }
}

async function saveData(data) {
  try {
    localStorage.setItem('jump-planner-data', JSON.stringify(data));
  } catch(e) {
    console.error('Save failed', e);
  }
}

let APP = null;
let currentWeekId = null;
let currentDayId = null;

async function initApp() {
  const saved = await loadData();
  APP = saved || JSON.parse(JSON.stringify(SEED_DATA));
  const vEl = document.getElementById('app-version-label');
  if (vEl) vEl.textContent = APP_VERSION;
  renderHome();
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════

function showScreen(id, direction = 'forward') {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('slide-left');
    if (s.id !== id) {
      if (direction === 'forward') s.classList.add('hidden');
      else s.classList.add('hidden');
    }
  });
  const target = document.getElementById(id);
  target.classList.remove('hidden', 'slide-left');
  target.scrollTop = 0;
}

function goHome() {
  showScreen('screen-home', 'back');
  currentWeekId = null;
  currentDayId = null;
}

function goWeek() {
  showScreen('screen-week', 'back');
  currentDayId = null;
}

// ══════════════════════════════════════════════
// RENDER: HOME
// ══════════════════════════════════════════════

function renderHome() {
  const container = document.getElementById('week-tiles');
  container.innerHTML = '';

  APP.weeks.forEach(week => {
    const tile = document.createElement('div');
    tile.className = 'week-tile';
    tile.onclick = () => openWeek(week.id);

    const dayDots = week.days.map(d =>
      `<div class="day-dot" style="background:${d.color}88"></div>`
    ).join('');

    const meetBadge = week.meet
      ? `<div class="week-tile-badge" style="background:rgba(224,85,85,0.15);color:#E05555;border:1px solid rgba(224,85,85,0.3);">MEET SAT</div>`
      : '';

    tile.innerHTML = `
      <div class="week-tile-accent" style="background:${week.color}"></div>
      <div class="week-tile-top">
        <div>
          <div class="week-tile-name" style="color:${week.color}">${week.name}</div>
          <div class="week-tile-date">${week.dates}</div>
        </div>
        ${meetBadge}
      </div>
      <div class="week-tile-days">${dayDots}</div>
      <div class="week-tile-chevron">›</div>
    `;
    container.appendChild(tile);
  });
}

// ══════════════════════════════════════════════
// RENDER: WEEK
// ══════════════════════════════════════════════

function openWeek(weekId) {
  currentWeekId = weekId;
  const week = APP.weeks.find(w => w.id === weekId);
  renderWeek(week);
  showScreen('screen-week');
}

function renderWeek(week) {
  document.getElementById('week-nav-title').textContent = week.name.toUpperCase();
  document.getElementById('week-hero-label').textContent = week.label || 'Practice Week';
  document.getElementById('week-hero-title').textContent = week.name;
  document.getElementById('week-hero-date').textContent = week.dates;

  // Intensity grid
  const grid = document.getElementById('week-intensity-grid');
  grid.innerHTML = '';
  week.days.forEach(day => {
    const col = document.createElement('div');
    col.className = 'int-day';
    col.innerHTML = `
      <div class="int-day-name">${day.name.substring(0,3)}</div>
      <div class="int-day-bar-track">
        <div class="int-day-bar-fill" style="height:${day.intensity}%;background:${day.color}"></div>
      </div>
      <div class="int-day-pct">${day.intensity}%</div>
    `;
    grid.appendChild(col);
  });

  // Coaching notes
  document.getElementById('week-coaching-notes').innerHTML = week.coachingNotes || 'No coaching notes yet.';

  // Meets
  const meetsEl = document.getElementById('week-meets');
  if (week.meets && week.meets.length) {
    meetsEl.innerHTML = week.meets.map(m => `
      <div class="meet-row">
        <span class="meet-badge" style="background:rgba(176,176,196,0.1);color:var(--silver-light);border:1px solid rgba(176,176,196,0.25);">${m.date}</span>
        <span class="meet-text"><strong>${m.type}:</strong> ${m.name}</span>
      </div>
    `).join('');
  } else {
    meetsEl.innerHTML = '<div style="color:var(--muted);font-size:12px;">No meets scheduled.</div>';
  }

  // Roster
  const rosterEl = document.getElementById('week-roster');
  const eliteAthletes = week.athletes.filter(a => a.group === 'elite');
  const beginnerBoth = week.athletes.filter(a => a.group === 'beginner' && a.events.includes('TJ'));
  const beginnerLJ = week.athletes.filter(a => a.group === 'beginner' && !a.events.includes('TJ'));

  rosterEl.innerHTML = '';
  [
    { label: 'Elite', athletes: eliteAthletes, color: 'var(--elite-light)' },
    { label: 'Beginner — Both Events', athletes: beginnerBoth, color: 'var(--beginner-light)' },
    { label: 'Beginner — Long Jump Only', athletes: beginnerLJ, color: 'var(--beginner-light)' }
  ].forEach(group => {
    if (!group.athletes.length) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'roster-group';
    groupEl.innerHTML = `<div class="roster-group-label">${group.label}</div>` +
      group.athletes.map(a => `
        <div class="athlete-row" onclick="openEditAthleteModal('${a.id}')">
          <div class="athlete-dot" style="background:${group.color}"></div>
          <div class="athlete-name">${a.name}</div>
          <div class="athlete-marks">
            <span style="color:var(--silver-light);font-size:9px;">${a.events}</span>
            <span>${a.marks}</span>
          </div>
        </div>
      `).join('');
    rosterEl.appendChild(groupEl);
  });

  // Day tiles
  const tilesEl = document.getElementById('week-day-tiles');
  tilesEl.innerHTML = '';
  week.days.forEach(day => {
    const tile = document.createElement('div');
    tile.className = 'day-tile';
    tile.onclick = () => openDay(day.id);
    tile.innerHTML = `
      <div class="day-tile-accent" style="background:${day.color}"></div>
      <div class="day-tile-tag" style="background:${day.color}22;color:${day.color};border:1px solid ${day.color}44;">${day.tag}</div>
      <div class="day-tile-name" style="color:${day.color}">${day.name}</div>
      <div class="day-tile-focus">${day.focus}</div>
      <div class="day-tile-int"><div class="day-tile-int-fill" style="width:${day.intensity}%;background:${day.color}"></div></div>
      <div class="day-tile-int-pct">${day.intensity}%</div>
    `;
    tilesEl.appendChild(tile);
  });
}

// ══════════════════════════════════════════════
// RENDER: DAY
// ══════════════════════════════════════════════

function openDay(dayId) {
  currentDayId = dayId;
  const week = APP.weeks.find(w => w.id === currentWeekId);
  const day = week.days.find(d => d.id === dayId);
  renderDay(week, day);
  showScreen('screen-day');
}

function renderDay(week, day) {
  document.getElementById('day-nav-title').textContent = day.name.toUpperCase();
  document.getElementById('day-hero-label').textContent = week.name;
  document.getElementById('day-hero-title').textContent = day.name;
  document.getElementById('day-hero-title').style.color = day.color;
  document.getElementById('day-hero-focus').textContent = day.focus;
  document.getElementById('day-int-fill').style.cssText = `width:${day.intensity}%;background:${day.color}`;
  document.getElementById('day-int-pct').textContent = `${day.intensity}%`;

  const sectionsEl = document.getElementById('day-sections');
  sectionsEl.innerHTML = '';

  day.sections.forEach((section, si) => {
    const card = document.createElement('div');
    card.className = 'section-card';

    const body = document.createElement('div');
    body.className = 'section-card-body open';
    body.innerHTML = renderSectionBlocks(section.blocks);

    const header = document.createElement('div');
    header.className = 'section-card-header';
    header.innerHTML = `
      <div class="section-card-title">${section.title}</div>
      <div class="section-card-chevron open">›</div>
    `;
    header.onclick = () => {
      const isOpen = body.classList.toggle('open');
      header.querySelector('.section-card-chevron').classList.toggle('open', isOpen);
    };

    card.appendChild(header);
    card.appendChild(body);
    sectionsEl.appendChild(card);
  });
}

function renderSectionBlocks(blocks) {
  return blocks.map(block => {
    if (block.type === 'warmup') {
      return `
        <div class="practice-block warmup">
          <div class="block-label">${block.label}</div>
          <div class="warmup-text">${(block.content || '').replace(/\n/g,'<br>')}
          ${block.optional ? `<br><span class="opt-text">Optional: ${block.optional}</span>` : ''}</div>
        </div>
      `;
    }

    const drillsHTML = block.drills ? `
      <ul class="drill-list">
        ${block.drills.map(d => `
          <li><strong>${d.name}</strong>${d.note ? `<em>${d.note}</em>` : ''}</li>
        `).join('')}
      </ul>
    ` : '';

    const pillsHTML = block.pills ? `
      <div class="vol-row">
        ${block.pills.map(p => `<div class="vol-pill">${p}</div>`).join('')}
      </div>
    ` : '';

    const labelStyle = block.centerLabel ? 'text-align:center;' : '';

    return `
      <div class="practice-block ${block.type}">
        <div class="block-label" style="${labelStyle}">${block.label}</div>
        ${drillsHTML}
        ${pillsHTML}
      </div>
    `;
  }).join('');
}

  const type = document.getElementById('em-type').value.trim();
  const name = document.getElementById('em-name').value.trim();
  if (!date || !name) { showToast('Enter date and name'); return; }
  week.meets = week.meets || [];
  week.meets.push({ date, type: type || 'Meet', name });
  saveData(APP);
  closeModalDirect();
  renderWeek(week);
  showToast('Meet added');
}

function deleteMeet(index) {
  const week = APP.weeks.find(w => w.id === currentWeekId);
  week.meets.splice(index, 1);
  saveData(APP);
  closeModalDirect();
  renderWeek(week);
  showToast('Meet removed');
}

// Athlete Modal
function openEditAthleteModal(athleteId) {
  const week = APP.weeks.find(w => w.id === currentWeekId);
  const athlete = athleteId ? week.athletes.find(a => a.id === athleteId) : null;
  const isNew = !athlete;

  openModal(`
    <div class="modal-title">${isNew ? 'Add Athlete' : 'Edit Athlete'} <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div class="modal-field">
      <div class="modal-label">Name</div>
      <input class="modal-input" id="ea-name" value="${athlete?.name || ''}" placeholder="Full Name">
    </div>
    <div class="modal-field">
      <div class="modal-label">Group</div>
      <select class="modal-select" id="ea-group">
        <option value="elite" ${athlete?.group==='elite'?'selected':''}>Elite</option>
        <option value="beginner" ${athlete?.group!=='elite'?'selected':''}>Beginner</option>
      </select>
    </div>
    <div class="modal-field">
      <div class="modal-label">Events</div>
      <input class="modal-input" id="ea-events" value="${athlete?.events || ''}" placeholder="LJ · TJ">
    </div>
    <div class="modal-field">
      <div class="modal-label">Current Marks</div>
      <input class="modal-input" id="ea-marks" value="${athlete?.marks || ''}" placeholder="LJ 18'0&quot; · TJ 32'8&quot;">
    </div>
    <button class="modal-btn" onclick="saveAthlete('${athleteId || ''}')">Save</button>
    ${!isNew ? `<button class="modal-btn modal-btn-danger" onclick="deleteAthlete('${athleteId}')">Remove Athlete</button>` : ''}
  `);
}

function saveAthlete(athleteId) {
  const week = APP.weeks.find(w => w.id === currentWeekId);
  const name = document.getElementById('ea-name').value.trim();
  if (!name) { showToast('Enter athlete name'); return; }

  if (athleteId) {
    const a = week.athletes.find(a => a.id === athleteId);
    a.name = name;
    a.group = document.getElementById('ea-group').value;
    a.events = document.getElementById('ea-events').value.trim();
    a.marks = document.getElementById('ea-marks').value.trim();
  } else {
    week.athletes.push({
      id: 'ath-' + Date.now(),
      name,
      group: document.getElementById('ea-group').value,
      events: document.getElementById('ea-events').value.trim(),
      marks: document.getElementById('ea-marks').value.trim() || 'No marks yet'
    });
  }
  saveData(APP);
  closeModalDirect();
  renderWeek(week);
  showToast(athleteId ? 'Athlete updated' : 'Athlete added');
}

function deleteAthlete(athleteId) {
  const week = APP.weeks.find(w => w.id === currentWeekId);
  week.athletes = week.athletes.filter(a => a.id !== athleteId);
  saveData(APP);
  closeModalDirect();
  renderWeek(week);
  showToast('Athlete removed');
}

// ══════════════════════════════════════════════
// AUTH — PASSPHRASE (session-based)
// ══════════════════════════════════════════════

const PASSPHRASE = '5522';
let sessionUnlocked = false;

function requireAuth(callback) {
  if (sessionUnlocked) { callback(); return; }

  // Build passphrase modal
  const html = `
    <div class="modal-title" style="font-size:22px;">Coach Access <button class="modal-close" onclick="closeModalDirect()">×</button></div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:20px;font-weight:300;">Enter passphrase to edit</div>
    <div class="modal-field">
      <div class="modal-label">Passphrase</div>
      <input class="modal-input" id="auth-input" type="password" placeholder="••••" inputmode="numeric"
        style="font-size:22px;letter-spacing:6px;text-align:center;"
        onkeydown="if(event.key==='Enter') submitAuth()">
    </div>
    <div id="auth-error" style="color:var(--optional);font-size:12px;text-align:center;height:18px;margin-bottom:4px;"></div>
    <button class="modal-btn" onclick="submitAuth()">Unlock</button>
  `;

  // Store callback, open modal
  window._authCallback = callback;
  openModal(html);
  setTimeout(() => {
    const inp = document.getElementById('auth-input');
    if (inp) inp.focus();
  }, 350);
}

function submitAuth() {
  const val = document.getElementById('auth-input')?.value;
  if (val === PASSPHRASE) {
    sessionUnlocked = true;
    closeModalDirect();
    showToast('Coach mode unlocked');
    if (window._authCallback) {
      const cb = window._authCallback;
      window._authCallback = null;
      setTimeout(cb, 200);
    }
  } else {
    const err = document.getElementById('auth-error');
    if (err) {
      err.textContent = 'Incorrect passphrase';
      const inp = document.getElementById('auth-input');
      if (inp) { inp.value = ''; inp.focus(); }
      setTimeout(() => { if (err) err.textContent = ''; }, 2000);
    }
  }
}

// Wrap all edit-triggering functions with auth gate
