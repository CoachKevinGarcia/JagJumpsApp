<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="#0D1B2A"/>

  <!-- Sand pit -->
  <ellipse cx="130" cy="160" rx="48" ry="14" fill="#C8A96E" opacity="0.3"/>
  <ellipse cx="130" cy="160" rx="36" ry="10" fill="#C8A96E" opacity="0.45"/>

  <!-- Takeoff board -->
  <rect x="28" y="144" width="42" height="8" rx="3" fill="#B0B0C4" opacity="0.55"/>

  <!-- Athlete — hang position mid-flight -->
  <!-- Head -->
  <circle cx="76" cy="42" r="13" fill="#B0B0C4"/>
  <!-- Torso -->
  <line x1="76" y1="55" x2="76" y2="92" stroke="#B0B0C4" stroke-width="8" stroke-linecap="round"/>
  <!-- Arms raised — hang -->
  <line x1="76" y1="65" x2="44" y2="50" stroke="#B0B0C4" stroke-width="7" stroke-linecap="round"/>
  <line x1="76" y1="65" x2="110" y2="50" stroke="#B0B0C4" stroke-width="7" stroke-linecap="round"/>
  <!-- Left leg — forward kick -->
  <line x1="76" y1="92" x2="52" y2="118" stroke="#B0B0C4" stroke-width="7" stroke-linecap="round"/>
  <line x1="52" y1="118" x2="32" y2="106" stroke="#B0B0C4" stroke-width="6" stroke-linecap="round"/>
  <!-- Right leg — trailing -->
  <line x1="76" y1="92" x2="104" y2="122" stroke="#B0B0C4" stroke-width="7" stroke-linecap="round"/>
  <line x1="104" y1="122" x2="124" y2="114" stroke="#B0B0C4" stroke-width="6" stroke-linecap="round"/>

  <!-- Motion arc dashes -->
  <path d="M 40 148 Q 84 96 128 152" stroke="#B0B0C4" stroke-width="3" stroke-dasharray="8 8" opacity="0.25" fill="none"/>
</svg>
